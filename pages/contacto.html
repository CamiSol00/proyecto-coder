<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- link bootstrap css -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT"
      crossorigin="anonymous"
    />
    <!-- shortcut icon -->
    <link rel="shortcut icon" href="../medios/icono.png" type="image/x-icon" />
    <!-- link css -->
    <link rel="stylesheet" href="../css/style.css" />
    <title>Contacto</title>
  </head>
  <body class="gridC_container_body">
    <header class="gridC_item_header">
      <!-- encabezado del sitio -->
      <section>
        <div class="primerDivRosa bg-pink py-0,5 text-center">
          <p class="div_p_tienda fs-4 text-white mb-2">Tienda</p>
          <h1 class="div_p_MF display-4 text-white mb-3">MALA FIT</h1>
          <hr />
        </div>
      </section>
      <nav class="navbar navbar-expand-md navbar-light bg-transparent m-0 p-0">
        <div class="container mb-0">
          <!-- Botón de hamburguesa -->
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#menu"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <!-- Contenedor de los enlaces -->
          <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto nav_ul justify-content-center w-100">
              <li class="nav-item nav_ul_li">
                <a class="nav-link nav_ul_li_a" href="../index.html">Inicio</a>
              </li>
              <li class="nav-item nav_ul_li">
                <a class="nav-link nav_ul_li_a" href="./productos.html"
                  >Productos</a
                >
              </li>
              <li class="nav-item nav_ul_li">
                <a class="nav-link nav_ul_li_a" href="./como-comprar.html"
                  >¿Cómo Comprar?</a
                >
              </li>
              <li class="nav-item nav_ul_li">
                <a class="nav-link nav_ul_li_a" href="./contacto.html"
                  >Contacto</a
                >
              </li>
              <li class="nav-item nav_ul_li">
                <a class="nav-link nav_ul_li_a" href="./sale.html">SALE</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
      <hr />
    </header>
    <main class="gridC_item_main">
      <!-- contenido principal del sitio -->
      <div class="ms-md-4 ms-sm-5 ms-4">
        <p class="tituloH2_todas mb-1">Inicio &gt; Contacto</p>
        <h2 class="tituloH3_todas">Contacto</h2>
      </div>

      <form action="" class="form_gral container">
        <div class="mb-3 mt-4">
          <label for="nombre" class="form-label">Nombre:</label>
          <input
            type="text"
            class="form-control"
            id="nombre"
            placeholder="Tu nombre"
          />
        </div>

        <div class="mb-3">
          <label for="email" class="form-label">Email:</label>
          <input
            type="email"
            class="form-control"
            id="email"
            placeholder="tu@email.com"
          />
        </div>

        <div class="mb-3">
          <label for="telefono" class="form-label">Teléfono:</label>
          <input
            type="tel"
            class="form-control"
            id="telefono"
            placeholder="Ej: 11 1234-5678"
          />
        </div>

        <div class="mb-3">
          <label for="mensaje" class="form-label">Mensaje:</label>
          <textarea
            class="form-control"
            id="mensaje"
            rows="4"
            placeholder="Deje aquí su mensaje"
          ></textarea>
        </div>

        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-primary">Enviar</button>
        </div>
      </form>
    </main>
    <footer class="gridI_item_footer footer container mt-5">
      <hr />
      <!-- Formulario de suscripción -->
      <div class="row justify-content-center mb-4">
        <div class="col-12 col-md-10 col-lg-8">
          <form class="footer_form" action="">
            <label
              for="suscripcion"
              class="form-label text-uppercase mb-4 text-center text-md-start"
            >
              SUSCRIBITE PARA RECIBIR TODAS NUESTRAS NOVEDADES
            </label>
            <div class="mb-3">
              <input
                type="email"
                id="suscripcion"
                class="form-control footer_email"
                placeholder="Tu email"
                required
              />
            </div>
            <div>
              <button
                type="submit"
                class="footer_btn btn btn-primary w-100"
                style="max-width: 420px"
              >
                Enviar
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- Icono de Instagram -->
      <div class="row justify-content-left mb-3">
        <div class="col-5 text-center">
          <a href="https://www.instagram.com/malafit/?hl=es" target="_blank">
            <img
              src="../medios/instagram.png"
              alt="Instagram"
              class="footer_img img-fluid"
              style="max-height: 40px; max-width: 40px"
            />
          </a>
        </div>
      </div>

      <!-- Categorías y Copyright -->
      <div class="row justify-content-center mt-3">
        <!-- Categorías -->
        <div class="col-12 col-md-6 text-center text-md-start mb-3">
          <strong class="d-block mb-2 text-uppercase">CATEGORÍAS</strong>
          <ul class="footer_ul list-unstyled">
            <li><a href="../index.html" class="footer_ul_li_a">Inicio</a></li>
            <li>
              <a href="./productos.html" class="footer_ul_li_a">Productos</a>
            </li>
            <li>
              <a href="./como-comprar.html" class="footer_ul_li_a"
                >¿Cómo Comprar?</a
              >
            </li>
            <li>
              <a href="./contacto.html" class="footer_ul_li_a">Contacto</a>
            </li>
            <li>
              <a href="./sale.html" class="footer_ul_li_a">SALE</a>
            </li>
          </ul>
        </div>

        <!-- Copyright -->
        <div class="col-12 text-center mt-3">
          <p class="footer_copy">
            ©2025 MALA FIT. Todos los derechos reservados.
          </p>
        </div>
      </div>
    </footer>

    <!-- script bootstrap -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
